<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Coletores</title>
<style>
:root{
  --bg:#f4f5f7;--surface:#fff;--surface2:#f0f2f5;--border:rgba(0,0,0,.08);
  --text:#1a1d23;--muted:#6b7280;--accent:#1d4ed8;--success:#166534;
  --warn:#b45309;--danger:#b91c1c;--r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:16px;letter-spacing:-.3px}
.logo-icon{width:28px;height:28px;background:#1d4ed8;border-radius:7px;display:flex;align-items:center;justify-content:center}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn{background:none;border:1px solid var(--border);border-radius:var(--rs);padding:5px 12px;font-size:12px;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:5px;transition:all .15s}
.btn:hover{background:var(--surface2);color:var(--text)}
.btn:disabled{opacity:.4;cursor:default}
.main{padding:1.25rem 1.5rem;max-width:1400px;margin:0 auto}
.pg-title{font-size:20px;font-weight:700;margin-bottom:3px;letter-spacing:-.4px}
.pg-sub{font-size:13px;color:var(--muted);margin-bottom:1.25rem}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:1.25rem}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1.1rem}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:5px}
.kpi-val{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:3px}
.c-blue{color:var(--accent)}.c-green{color:var(--success)}.c-warn{color:var(--warn)}.c-danger{color:var(--danger)}
.gauge-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem;margin-bottom:1.25rem}
.gauge-wrap{display:flex;align-items:center;gap:1rem;margin-top:8px}
.gauge-outer{flex:1;height:18px;background:var(--surface2);border-radius:99px;overflow:hidden}
.gauge-inner{height:100%;border-radius:99px;background:#1d4ed8;transition:width 1s}
.gauge-pct{font-size:24px;font-weight:700;color:var(--accent);min-width:58px;text-align:right}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1.25rem}
@media(max-width:820px){.grid2{grid-template-columns:1fr}}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem}
.ct{font-size:13px;font-weight:600;margin-bottom:.9rem;color:var(--text)}
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.5rem}
.th-row{padding:.9rem 1.1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.si{border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;font-size:12px;background:var(--surface2);color:var(--text);outline:none;width:200px}
.si:focus{border-color:var(--accent)}
.f-row{display:flex;gap:5px;flex-wrap:wrap;padding:8px 12px;border-bottom:1px solid var(--border)}
.fb{padding:3px 12px;border-radius:99px;border:1px solid var(--border);background:var(--surface);font-size:11px;cursor:pointer;color:var(--muted);transition:all .15s}
.fb.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.tb{padding:3px 11px;border-radius:99px;border:1px solid var(--border);background:var(--surface);font-size:11px;cursor:pointer;color:var(--muted);transition:all .15s}
.tb.on{background:#0f6e56;border-color:#0f6e56;color:#fff;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 11px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 11px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap}
.bg{background:#dcfce7;color:#166534}
.bb{background:#dbeafe;color:#1e40af}
.ba{background:#fef3c7;color:#92400e}
.br{background:#fee2e2;color:#991b1b}
.bz{background:#f3f4f6;color:#374151}
.bp{background:#ede9fe;color:#5b21b6}
.av{width:26px;height:26px;border-radius:50%;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.uc{display:flex;align-items:center;gap:6px}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:2.5rem;color:var(--muted);font-size:13px}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.errmsg{background:#fee2e2;color:#991b1b;padding:.9rem 1.1rem;border-radius:var(--r);font-size:13px;margin-bottom:1rem;line-height:1.5}
.errmsg code{background:#fecaca;padding:1px 5px;border-radius:4px;font-size:11px}
.empty{padding:2rem;text-align:center;color:var(--muted);font-size:13px}
.pag{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="7" height="9" rx="1"/><rect x="9" y="12" width="6" height="9" rx="1"/><rect x="15" y="3" width="7" height="6" rx="1"/><rect x="15" y="12" width="7" height="9" rx="1"/></svg>
    </div>
    Dashboard Coletores
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)">
      <div class="dot"></div><span id="ua">Carregando...</span>
    </div>
    <button class="btn" id="rbtn" onclick="loadData()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
      Atualizar
    </button>
  </div>
</header>

<div class="main">
  <div class="pg-title">Controle de Uso de Coletores</div>
  <div class="pg-sub" id="pgSub">—</div>
  <div id="errBox"></div>
  <div class="kpi-grid" id="kpiGrid"><div class="loading"><div class="spin"></div> Buscando dados...</div></div>
  <div class="gauge-card" id="gaugeCard"></div>
  <div class="grid2">
    <div class="cc"><div class="ct">Uso por Setor</div><div style="position:relative;height:250px"><canvas id="cSetor"></canvas></div></div>
    <div class="cc"><div class="ct">Top 10 Usuários</div><div id="cUserWrap" style="position:relative;height:280px"><canvas id="cUser"></canvas></div></div>
  </div>
  <div class="grid2">
    <div class="cc"><div class="ct">Movimentações por Dia (últimos 30 dias)</div><div style="position:relative;height:210px"><canvas id="cDia"></canvas></div></div>
    <div class="cc"><div class="ct">Estado na Entrega</div><div style="position:relative;height:210px"><canvas id="cEstado"></canvas></div></div>
  </div>
  <div class="grid2" style="margin-bottom:1.25rem">
    <div class="cc"><div class="ct">Por Turno</div><div style="position:relative;height:210px"><canvas id="cTurno"></canvas></div></div>
    <div class="cc"><div class="ct">Tipo de Coletor</div><div style="position:relative;height:210px"><canvas id="cTipo"></canvas></div></div>
  </div>

  <div class="table-card">
    <div class="th-row">
      <span style="font-size:13px;font-weight:600">Registros de Entregas e Devoluções</span>
      <input class="si" id="srch" type="text" placeholder="Buscar nome, setor, coletor…" oninput="pg=1;renderTable()">
    </div>
    <div class="f-row" id="fSetor"><button class="fb on" data-v="todos" onclick="setSt(this)">Todos os setores</button></div>
    <div class="f-row" id="fTurno"><button class="tb on" data-v="todos" onclick="setTu(this)">Todos os turnos</button></div>
    <div id="tbl"><div class="loading"><div class="spin"></div></div></div>
    <div class="pag" id="pgBar"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ── CONFIGURAÇÃO ─────────────────────────────────────────
const SHEET_ID  = '2PACX-1vQIbk4cMEQdZ1Hkq3rxWNVS_8ucDnh4ngPCigF_DHTAoTlBPvnTGeTTqz63Ekazy2sFYuAZxkQZ6yx4';
const SHEET_GID = '0';
const TOTAL     = 108; // total de coletores no inventário

const C = {
  nick:'NICK_NAME', col:'Nº COLETOR', mat:'MATRÍCULA', nome:'NOME',
  setor:'SETOR', turno:'TURNO', tipo:'TIPO_COLETOR',
  lanc:'DATA_LANÇAMENTO', ini:'DATA_INICAL', fim:'DATA_FINAL',
  tempo:'TEMPO', status:'STATUS_ENTREGA',
  estR:'ESTADO_RETIRADA_EQUIPA', estE:'ESTADO_ENTREGA_EQUIPA'
};

const EM_USO   = ['entregue','retirado','em uso','saída','saida','pendente'];
const DEVOLVIDO= ['devolvido','retornado','entrada','concluído','concluido'];
// ─────────────────────────────────────────────────────────

let ALL=[], fSetor='todos', fTurno='todos', pg=1;
const PS=15;
let CH={};

const TSV_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=${SHEET_GID}&single=true&output=tsv`;

function nrm(v){return(v||'').trim().toLowerCase()}
function parseD(s){
  if(!s)return null;
  let d=new Date(s);if(!isNaN(d))return d;
  let m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})[\s,T]*(\d{1,2})?:?(\d{2})?/);
  if(m)return new Date(`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}T${(m[4]||'00').padStart(2,'0')}:${m[5]||'00'}:00`);
  return null;
}
function fmtDT(s){const d=parseD(s);return d?d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):(s||'—')}
function fmtD(s){const d=parseD(s);return d?d.toLocaleDateString('pt-BR'):(s||'—')}
function ini(n){if(!n)return'?';const p=n.trim().split(' ').filter(Boolean);return p.length===1?p[0][0].toUpperCase():(p[0][0]+p[p.length-1][0]).toUpperCase()}
const AVCOLS=[['#dbeafe','#1e40af'],['#dcfce7','#166534'],['#ede9fe','#5b21b6'],['#fef3c7','#92400e'],['#fee2e2','#991b1b'],['#cffafe','#155e75']];
function avc(n){let h=0;for(const c of(n||''))h=(h*31+c.charCodeAt(0))&0xfffff;return AVCOLS[h%AVCOLS.length]}

function sBadge(v){const s=nrm(v);if(EM_USO.some(x=>s.includes(x)))return`<span class="badge bb">${v||'—'}</span>`;if(DEVOLVIDO.some(x=>s.includes(x)))return`<span class="badge bg">${v||'—'}</span>`;return`<span class="badge bz">${v||'—'}</span>`}
function eBadge(v){const s=nrm(v);if(!v||!v.trim())return`<span class="badge bz">—</span>`;if(s.includes('bom')||s.includes('ok')||s.includes('ótimo')||s.includes('otimo'))return`<span class="badge bg">${v}</span>`;if(s.includes('regular')||s.includes('médio')||s.includes('medio'))return`<span class="badge ba">${v}</span>`;if(s.includes('ruim')||s.includes('danif')||s.includes('defeito')||s.includes('avariado'))return`<span class="badge br">${v}</span>`;return`<span class="badge bz">${v}</span>`}

function emUso(data){
  const m={};
  data.forEach(r=>{const id=r[C.col];if(!id)return;const d=parseD(r[C.lanc])||parseD(r[C.ini])||new Date(0);if(!m[id]||d>m[id].d)m[id]={r,d};});
  return Object.values(m).filter(v=>EM_USO.some(x=>nrm(v.r[C.status]).includes(x))).length;
}

function vis(){
  return ALL.filter(r=>(fSetor==='todos'||r[C.setor]===fSetor)&&(fTurno==='todos'||r[C.turno]===fTurno));
}

async function loadData(){
  const btn=document.getElementById('rbtn');
  btn.disabled=true;
  document.getElementById('ua').textContent='Atualizando...';
  document.getElementById('errBox').innerHTML='';

  // Tenta buscar direto; se falhar, usa proxy CORS
  const urls=[
    TSV_URL,
    `https://corsproxy.io/?${encodeURIComponent(TSV_URL)}`
  ];

  let txt=null, lastErr='';
  for(const url of urls){
    try{
      const r=await fetch(url,{cache:'no-store'});
      if(!r.ok)throw new Error('HTTP '+r.status);
      txt=await r.text();
      if(txt&&txt.includes('\t'))break;
      else txt=null;
    }catch(e){lastErr=e.message;txt=null;}
  }

  if(!txt){
    document.getElementById('ua').textContent='Erro';
    document.getElementById('errBox').innerHTML=`
      <div class="errmsg">
        ⚠️ <strong>Não foi possível carregar a planilha.</strong><br>
        Erro: <code>${lastErr}</code><br><br>
        Verifique se a planilha está publicada corretamente:<br>
        <strong>Arquivo → Compartilhar → Publicar na web → Selecionar a aba → formato TSV → Publicar</strong><br>
        O link deve terminar em <code>output=tsv</code>.
      </div>`;
    btn.disabled=false;
    return;
  }

  const rows=txt.trim().split('\n').map(r=>r.split('\t'));
  if(rows.length<2){
    document.getElementById('errBox').innerHTML=`<div class="errmsg">⚠️ Planilha carregada mas sem dados (apenas cabeçalho). Verifique se há registros na aba.</div>`;
    btn.disabled=false;
    return;
  }

  const hdrs=rows[0].map(h=>h.trim());
  ALL=rows.slice(1)
    .map(r=>{const o={};hdrs.forEach((h,i)=>o[h]=(r[i]||'').trim());return o;})
    .filter(r=>r[C.nome]||r[C.col]||r[C.nick]);

  document.getElementById('ua').textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  btn.disabled=false;
  renderAll();
}

function renderAll(){
  buildFilters();renderKPIs();renderGauge();
  renderSetor();renderUser();renderDia();renderEstado();renderTurno();renderTipo();
  pg=1;renderTable();renderSub();
}

function renderSub(){
  const ds=ALL.map(r=>parseD(r[C.lanc])||parseD(r[C.ini])).filter(Boolean).sort((a,b)=>a-b);
  if(ds.length>=2)document.getElementById('pgSub').textContent=`Período: ${ds[0].toLocaleDateString('pt-BR')} – ${ds[ds.length-1].toLocaleDateString('pt-BR')} · ${ALL.length} registros`;
  else document.getElementById('pgSub').textContent=`${ALL.length} registros`;
}

function buildFilters(){
  const ss=[...new Set(ALL.map(r=>r[C.setor]).filter(Boolean))].sort();
  const ts=[...new Set(ALL.map(r=>r[C.turno]).filter(Boolean))].sort();
  document.getElementById('fSetor').innerHTML=
    `<button class="fb ${fSetor==='todos'?'on':''}" data-v="todos" onclick="setSt(this)">Todos</button>`+
    ss.map(s=>`<button class="fb ${fSetor===s?'on':''}" data-v="${s}" onclick="setSt(this)">${s}</button>`).join('');
  document.getElementById('fTurno').innerHTML=
    `<button class="tb ${fTurno==='todos'?'on':''}" data-v="todos" onclick="setTu(this)">Todos</button>`+
    ts.map(t=>`<button class="tb ${fTurno===t?'on':''}" data-v="${t}" onclick="setTu(this)">${t}</button>`).join('');
}

function setSt(b){fSetor=b.dataset.v;document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');pg=1;rv()}
function setTu(b){fTurno=b.dataset.v;document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));b.classList.add('on');pg=1;rv()}
function rv(){renderKPIs();renderGauge();renderUser();renderDia();renderEstado();renderTurno();renderTipo();renderTable()}

function renderKPIs(){
  const d=vis(),eu=emUso(d);
  const dev=d.filter(r=>DEVOLVIDO.some(x=>nrm(r[C.status]).includes(x))).length;
  const usr=new Set(d.map(r=>r[C.nome]).filter(Boolean)).size;
  const hj=new Date().toDateString();
  const mh=d.filter(r=>{const dt=parseD(r[C.lanc])||parseD(r[C.ini]);return dt&&dt.toDateString()===hj}).length;
  const pend=d.filter(r=>nrm(r[C.status]).includes('pend')).length;
  const livre=TOTAL-eu;
  document.getElementById('kpiGrid').innerHTML=`
    <div class="kpi"><div class="kpi-lbl">Total Registros</div><div class="kpi-val c-blue">${d.length}</div><div class="kpi-sub">movimentações</div></div>
    <div class="kpi"><div class="kpi-lbl">Em Uso</div><div class="kpi-val c-green">${eu}</div><div class="kpi-sub">de ${TOTAL} coletores</div></div>
    <div class="kpi"><div class="kpi-lbl">Disponíveis</div><div class="kpi-val">${livre}</div><div class="kpi-sub">livres no momento</div></div>
    <div class="kpi"><div class="kpi-lbl">Devoluções</div><div class="kpi-val">${dev}</div><div class="kpi-sub">retornos</div></div>
    <div class="kpi"><div class="kpi-lbl">Colaboradores</div><div class="kpi-val">${usr}</div><div class="kpi-sub">usuários distintos</div></div>
    <div class="kpi"><div class="kpi-lbl">Hoje</div><div class="kpi-val c-warn">${mh}</div><div class="kpi-sub">movimentações</div></div>
    <div class="kpi"><div class="kpi-lbl">Pendentes</div><div class="kpi-val ${pend>0?'c-danger':''}">${pend}</div><div class="kpi-sub">entregas</div></div>
  `;
}

function renderGauge(){
  const eu=emUso(vis()),pct=Math.round(eu/TOTAL*100),liv=TOTAL-eu;
  document.getElementById('gaugeCard').innerHTML=`
    <div style="font-size:13px;font-weight:600;margin-bottom:6px">Taxa de Ocupação — ${eu} em uso · ${liv} disponíveis · ${TOTAL} no total</div>
    <div class="gauge-wrap">
      <span style="font-size:12px;color:var(--muted);min-width:80px">${liv} livres</span>
      <div class="gauge-outer"><div class="gauge-inner" style="width:${pct}%"></div></div>
      <div class="gauge-pct">${pct}%</div>
    </div>`;
}

const PAL=['#1d4ed8','#0f6e56','#b45309','#7c3aed','#be123c','#0891b2','#4d7c0f','#92400e','#475569','#0e7490'];
function dc(k){if(CH[k]){CH[k].destroy();delete CH[k]}}

function renderSetor(){
  dc('s');const cnt={};
  ALL.forEach(r=>{const s=r[C.setor]||'—';cnt[s]=(cnt[s]||0)+1});
  const labs=Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a]);
  CH.s=new Chart(document.getElementById('cSetor'),{type:'bar',
    data:{labels:labs,datasets:[{data:labs.map(l=>cnt[l]),backgroundColor:PAL.map(c=>c+'bb'),borderColor:PAL,borderWidth:1.5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}}},y:{beginAtZero:true,ticks:{font:{size:10},precision:0}}}}
  });
}

function renderUser(){
  dc('u');const d=vis(),cnt={};
  d.forEach(r=>{const u=r[C.nome]||r[C.nick]||'—';cnt[u]=(cnt[u]||0)+1});
  const s=Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const h=Math.max(260,s.length*34+70);
  document.getElementById('cUserWrap').style.height=h+'px';
  CH.u=new Chart(document.getElementById('cUser'),{type:'bar',
    data:{labels:s.map(x=>x[0].split(' ')[0]),datasets:[{data:s.map(x=>x[1]),backgroundColor:'#1d4ed8bb',borderColor:'#1d4ed8',borderWidth:1.5}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{font:{size:10},precision:0}},y:{ticks:{font:{size:10}}}}}
  });
}

function renderDia(){
  dc('d');const d=vis(),cnt={};
  d.forEach(r=>{const dt=parseD(r[C.lanc])||parseD(r[C.ini]);if(!dt)return;const k=dt.toLocaleDateString('pt-BR');cnt[k]=(cnt[k]||0)+1});
  const s=Object.entries(cnt).sort((a,b)=>{const p=x=>{const[dd,mm,yy]=x.split('/').map(Number);return new Date(yy,mm-1,dd)};return p(a[0])-p(b[0])}).slice(-30);
  CH.d=new Chart(document.getElementById('cDia'),{type:'line',
    data:{labels:s.map(x=>x[0]),datasets:[{data:s.map(x=>x[1]),borderColor:'#1d4ed8',backgroundColor:'#1d4ed815',tension:.4,fill:true,pointRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},maxRotation:45,autoSkip:true,maxTicksLimit:10}},y:{beginAtZero:true,ticks:{font:{size:10},precision:0}}}}
  });
}

function renderEstado(){
  dc('e');const d=vis(),cnt={};
  d.forEach(r=>{const e=r[C.estE]||r[C.estR]||'Não informado';cnt[e]=(cnt[e]||0)+1});
  const labs=Object.keys(cnt);
  CH.e=new Chart(document.getElementById('cEstado'),{type:'doughnut',
    data:{labels:labs,datasets:[{data:labs.map(l=>cnt[l]),backgroundColor:PAL.slice(0,labs.length).map(c=>c+'cc'),borderColor:PAL.slice(0,labs.length),borderWidth:1.5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},padding:8,boxWidth:10}}}}
  });
}

function renderTurno(){
  dc('t');const d=vis(),cnt={};
  d.forEach(r=>{const t=r[C.turno]||'—';cnt[t]=(cnt[t]||0)+1});
  const labs=Object.keys(cnt);
  CH.t=new Chart(document.getElementById('cTurno'),{type:'doughnut',
    data:{labels:labs,datasets:[{data:labs.map(l=>cnt[l]),backgroundColor:['#1d4ed8cc','#0f6e56cc','#b45309cc','#7c3aedcc','#be123ccc'],borderColor:['#1d4ed8','#0f6e56','#b45309','#7c3aed','#be123c'],borderWidth:1.5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},padding:8,boxWidth:10}}}}
  });
}

function renderTipo(){
  dc('ti');const d=vis(),cnt={};
  d.forEach(r=>{const t=r[C.tipo]||'—';cnt[t]=(cnt[t]||0)+1});
  const labs=Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a]);
  CH.ti=new Chart(document.getElementById('cTipo'),{type:'bar',
    data:{labels:labs,datasets:[{data:labs.map(l=>cnt[l]),backgroundColor:PAL.map(c=>c+'bb'),borderColor:PAL,borderWidth:1.5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}}},y:{beginAtZero:true,ticks:{font:{size:10},precision:0}}}}
  });
}

function renderTable(){
  const q=nrm(document.getElementById('srch').value);
  let rows=vis();
  if(q)rows=rows.filter(r=>[C.nome,C.nick,C.setor,C.col,C.status,C.turno,C.tipo,C.mat].some(k=>nrm(r[k]).includes(q)));
  rows=[...rows].sort((a,b)=>{
    const da=parseD(a[C.lanc])||parseD(a[C.ini])||new Date(0);
    const db=parseD(b[C.lanc])||parseD(b[C.ini])||new Date(0);
    return db-da;
  });
  const tot=rows.length,pgs=Math.max(1,Math.ceil(tot/PS));
  if(pg>pgs)pg=pgs;
  const sl=rows.slice((pg-1)*PS,pg*PS);
  if(!sl.length){document.getElementById('tbl').innerHTML='<div class="empty">Nenhum registro encontrado.</div>';document.getElementById('pgBar').innerHTML='';return}
  document.getElementById('tbl').innerHTML=`<div style="overflow-x:auto"><table>
    <thead><tr><th>Data Lanç.</th><th>Usuário</th><th>Matríc.</th><th>Setor</th><th>Turno</th><th>Coletor</th><th>Tipo</th><th>Início</th><th>Fim</th><th>Tempo</th><th>Status</th><th>Est. Retirada</th><th>Est. Entrega</th></tr></thead>
    <tbody>${sl.map(r=>{
      const[bg,fg]=avc(r[C.nome]||r[C.nick]);
      return`<tr>
        <td style="white-space:nowrap;color:var(--muted)">${fmtDT(r[C.lanc])}</td>
        <td><div class="uc"><div class="av" style="background:${bg};color:${fg}">${(r[C.nick]||ini(r[C.nome])).substring(0,2).toUpperCase()}</div><div><div style="font-weight:600">${r[C.nome]||r[C.nick]||'—'}</div>${r[C.nick]&&r[C.nome]?`<div style="font-size:10px;color:var(--muted)">${r[C.nick]}</div>`:''}</div></div></td>
        <td style="color:var(--muted)">${r[C.mat]||'—'}</td>
        <td>${r[C.setor]||'—'}</td>
        <td><span class="badge bp">${r[C.turno]||'—'}</span></td>
        <td><strong>${r[C.col]||'—'}</strong></td>
        <td>${r[C.tipo]||'—'}</td>
        <td style="white-space:nowrap">${fmtD(r[C.ini])}</td>
        <td style="white-space:nowrap">${fmtD(r[C.fim])}</td>
        <td style="font-weight:600">${r[C.tempo]||'—'}</td>
        <td>${sBadge(r[C.status])}</td>
        <td>${eBadge(r[C.estR])}</td>
        <td>${eBadge(r[C.estE])}</td>
      </tr>`}).join('')}</tbody></table></div>`;
  document.getElementById('pgBar').innerHTML=`
    <span>${tot} registros · pág. ${pg}/${pgs}</span>
    <div style="display:flex;gap:5px">
      <button class="btn" onclick="if(pg>1){pg--;renderTable()}" ${pg===1?'disabled':''}>← Ant.</button>
      <button class="btn" onclick="if(pg<${pgs}){pg++;renderTable()}" ${pg===pgs?'disabled':''}>Próx. →</button>
    </div>`;
}

setInterval(loadData,5*60*1000);
loadData();
</script>
</body>
</html>
